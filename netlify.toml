# Netlify build configuration
[build]
  command = "npm run build"
  publish = "dist"

# Headers – cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# SPA client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
